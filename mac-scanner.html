<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PMY Open — Mac Scanner</title>
<style>
  :root {
    --ink:        #0d1b1e;
    --turf:       #1f6b4a;
    --turf-light: #2f8a61;
    --flag:       #d4452c;
    --sand:       #f4f0e6;
    --line:       #d9d3c2;
    --grey:       #5a6b66;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--ink);
    color: var(--sand);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%;
    overflow-x: hidden;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(244,240,230,0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    background: var(--turf);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .brand-mark svg { width: 16px; height: 16px; }

  .brand-text {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .brand-text span {
    display: block;
    font-size: 10px;
    font-weight: 500;
    color: var(--grey);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .installer-tag {
    font-size: 11px;
    color: var(--grey);
  }

  .installer-tag button {
    background: none;
    border: none;
    color: var(--turf-light);
    font-size: 11px;
    font-weight: 600;
    text-decoration: underline;
    padding: 0;
    margin-left: 6px;
    flex: none;
    width: auto;
  }

  .name-gate {
    position: fixed;
    inset: 0;
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
  }
  .name-gate.hidden { display: none; }

  .name-gate-card {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }

  .name-gate-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 18px;
    border-radius: 16px;
    background: rgba(31,107,74,0.25);
    border: 1px solid rgba(47,138,97,0.5);
    color: var(--turf-light);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .name-gate-icon svg { width: 28px; height: 28px; }

  .name-gate-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .name-gate-card p {
    font-size: 13px;
    color: var(--grey);
    margin-bottom: 20px;
  }

  #name-input, #job-input, #venue-input, #job-input-2, #venue-input-2 {
    width: 100%;
    background: var(--sand);
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 15px 16px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 12px;
  }
  #name-input:focus, #job-input:focus, #venue-input:focus,
  #job-input-2:focus, #venue-input-2:focus { outline: 2px solid var(--turf-light); }

  .name-gate-card p strong {
    color: var(--sand);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 14px;
  }

  #scan-region {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(244,240,230,0.1);
  }

  #scan-region video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .guide-box {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 82%;
    pointer-events: none;
  }

  .guide-bars {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 2px;
    height: 38px;
    margin-bottom: 6px;
    opacity: 0.85;
    filter: drop-shadow(0 0 3px rgba(0,0,0,0.6));
  }

  .guide-bar {
    background: var(--turf-light);
    border-radius: 0.5px;
  }

  .guide-text {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--turf-light);
    background: rgba(13,27,30,0.55);
    border: 1.5px dashed var(--turf-light);
    border-radius: 8px;
    padding: 9px 0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }

  .scan-state {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(244,240,230,0.85);
    text-transform: uppercase;
  }

  #scan-region.tappable { cursor: pointer; }

  @keyframes focuspulse {
    0%   { box-shadow: inset 0 0 0 0 rgba(47,138,97,0.9); }
    50%  { box-shadow: inset 0 0 0 4px rgba(47,138,97,0.9); }
    100% { box-shadow: inset 0 0 0 0 rgba(47,138,97,0); }
  }
  #scan-region.pulse { animation: focuspulse 0.5s ease-out; }

  #placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: var(--grey);
    font-size: 13px;
    text-align: center;
    padding: 0 30px;
  }

  #placeholder svg { width: 36px; height: 36px; opacity: 0.5; }

  .result-card {
    background: var(--sand);
    color: var(--ink);
    border-radius: 16px;
    padding: 18px;
    display: none;
  }

  .result-card.show { display: block; animation: rise 0.25s ease-out; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--turf);
    margin-bottom: 6px;
  }

  .result-value {
    width: 100%;
    border: none;
    background: transparent;
    font-family: "SF Mono", "Roboto Mono", monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .result-value:focus { outline: none; border-bottom: 2px solid var(--turf); }

  .result-meta {
    margin-top: 10px;
    font-size: 12px;
    color: var(--grey);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--turf); flex-shrink: 0; }

  .actions {
    display: flex;
    gap: 10px;
  }

  .actions-secondary {
    align-items: center;
  }

  .camera-actions {
    margin-top: 4px;
  }

  .btn-large {
    width: 100%;
    padding: 19px 18px;
    font-size: 17px;
  }

  .btn-small {
    flex: 0 0 auto;
    width: auto;
    padding: 10px 18px;
    font-size: 13px;
    margin-left: auto;
  }

  .btn-small-full {
    width: 100%;
    padding: 10px 18px;
    font-size: 13px;
  }

  .capture-preview {
    background: rgba(244,240,230,0.06);
    border-radius: 14px;
    padding: 10px;
  }

  .capture-preview-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--grey);
    margin-bottom: 8px;
  }

  .capture-preview img {
    width: 100%;
    border-radius: 8px;
    background: #fff;
    display: block;
  }

  button {
    font-family: inherit;
    border: none;
    border-radius: 12px;
    padding: 15px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    flex: 1;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }

  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--turf);
    color: var(--sand);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-ghost {
    background: rgba(244,240,230,0.08);
    color: var(--sand);
    border: 1px solid rgba(244,240,230,0.18);
    flex: 0 0 auto;
    width: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-ghost svg { width: 18px; height: 18px; }

  .btn-torch-active {
    background: var(--flag) !important;
    border-color: var(--flag) !important;
    color: var(--sand) !important;
  }

  .hint {
    font-size: 12px;
    color: var(--grey);
    text-align: center;
    line-height: 1.5;
    padding: 0 10px;
  }

  .hint strong { color: var(--sand); font-weight: 600; }

  #manual-toggle {
    background: none;
    border: none;
    color: var(--turf-light);
    font-size: 12px;
    font-weight: 600;
    text-decoration: underline;
    padding: 4px;
    flex: none;
  }

  #manual-wrap {
    display: none;
    gap: 10px;
  }
  #manual-wrap.show { display: flex; }

  #manual-input {
    flex: 1;
    background: var(--sand);
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 16px;
    font-family: "SF Mono", "Roboto Mono", monosp
